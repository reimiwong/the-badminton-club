name: Build and deploy Node.js app to Azure Web App - my-badminton-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        working-directory: the-badminton-club-backend
        run: npm ci

      - name: Build backend
        working-directory: the-badminton-club-backend
        run: npm run build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: my-badminton-backend
          slot-name: Production
          package: the-badminton-club-backend
