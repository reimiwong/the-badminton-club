name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1

        # ✅ THIS IS THE KEY FIX FOR VITE
        # Env vars MUST exist at build time
        env:
          VITE_API_URL: https://my-badminton-backend-dxgmh2emhzcmfmej.uksouth-01.azurewebsites.net

        with:
          # ✅ REQUIRED because your deployment policy = Deployment token
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_POND_0B7FF0910 }}

          # ✅ optional but recommended
          repo_token: ${{ secrets.GITHUB_TOKEN }}

          action: upload
          app_location: "./the-badminton-club-frontend"
          api_location: ""
          output_location: "dist"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_POND_0B7FF0910 }}
          action: close
