name: Generate Weekly Sessions

on:
  schedule:
    - cron: '0 0 1-31/14 * 1' # every 2 weeks on Monday at 00:00 UTC
  workflow_dispatch:   # allows manual run from GitHub UI

jobs:
  generate-sessions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./the-badminton-club-backend
        run: npm ci

      - name: Run weekly sessions script
        working-directory: ./the-badminton-club-backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx tsx src/admin.ts